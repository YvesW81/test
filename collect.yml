name: Collect laadpaal-statussen

on:
  schedule:
    - cron: "*/30 * * * *"   # elk half uur (UTC, timing kan enkele minuten afwijken)
  workflow_dispatch: {}       # handmatig starten via de Actions-tab

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Verzamel statussen
        run: python3 collect.py

      - name: Commit en push
        run: |
          git config user.name "laadpalen-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Niets te committen"
          else
            git commit -m "snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi
