name: Collect laadpaal-statussen

on:
  schedule:
    - cron: "7 * * * *"   # elk uur proberen te starten (minuut 7: minder drukte dan :00)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false   # nooit 2 tegelijk; 1 wacht in de rij

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Verzamel statussen (6 metingen, elke 30 min)
        run: |
          git config user.name "laadpalen-bot"
          git config user.email "actions@users.noreply.github.com"

          push_changes() {
            git add -A
            git diff --cached --quiet && { echo "niets te committen"; return 0; }
            git commit -m "snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
            for p in 1 2 3; do
              git push && return 0
              git pull --rebase -X theirs || git rebase --abort
              sleep 10
            done
            echo "push mislukt" >&2
            return 1
          }

          for i in 1 2 3 4 5 6; do
            echo "=== meting $i/6 om $(date -u +%H:%M) UTC ==="
            python3 collect.py || echo "meting $i mislukt, door naar de volgende"
            push_changes || true
            [ "$i" -lt 6 ] && sleep 1740
          done
